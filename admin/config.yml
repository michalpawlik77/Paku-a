backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "ustawienia"
    label: "Ustawienia strony"
    files:
      - name: "dane"
        label: "Treści strony"
        file: "dane.json"
        fields:

          - label: "── KONTAKT ──"
            name: "kontakt_header"
            widget: "hidden"
            default: ""

          - label: "Telefon (menu nawigacyjne)"
            name: "telefon_nav"
            widget: "string"
            default: "32 767 41 43"

          - label: "Telefon 1 (sekcja kontakt)"
            name: "telefon_1"
            widget: "string"
            default: "32 767 41 43"

          - label: "Telefon 2"
            name: "telefon_2"
            widget: "string"
            default: "783 979 826"

          - label: "Telefon 3"
            name: "telefon_3"
            widget: "string"
            default: "783 979 825"

          - label: "E-mail"
            name: "email"
            widget: "string"
            default: "pocztatwojebiuro@gmail.com"

          - label: "Adres biura"
            name: "adres"
            widget: "string"
            default: "Wyszyńskiego 6, 41-940 Piekary Śląskie"

          - label: "Godziny otwarcia (karta hero)"
            name: "godziny_hero"
            widget: "string"
            default: "Pon – Pt: 8:00 – 16:00"

          - label: "Godziny otwarcia (sekcja kontakt)"
            name: "godziny_kontakt"
            widget: "string"
            default: "Poniedziałek – Piątek: 8:00 – 16:00"

          - label: "── STRONA GŁÓWNA ──"
            name: "hero_header"
            widget: "hidden"
            default: ""

          - label: "Mały tekst nad hasłem"
            name: "chip"
            widget: "string"
            default: "Piekary Śląskie · ponad 15 lat doświadczenia"

          - label: "Główne hasło strony"
            name: "haslo"
            widget: "string"
            default: "Twój partner w biznesie"

          - label: "Opis pod hasłem"
            name: "opis"
            widget: "text"
            default: "Profesjonalna obsługa rachunkowa i kadrowo-płacowa dla firm z Górnego Śląska. Rzetelność, kompetencja, dobra cena."

          - label: "── PASEK USŁUG ──"
            name: "pasek_header"
            widget: "hidden"
            default: ""

          - label: "Pasek — usługa 1"
            name: "pasek_1"
            widget: "string"
            default: "Księgowość pełna i uproszczona"

          - label: "Pasek — usługa 2"
            name: "pasek_2"
            widget: "string"
            default: "Kadry i Płace · ZUS · PFRON"

          - label: "Pasek — usługa 3"
            name: "pasek_3"
            widget: "string"
            default: "Rejestracja i doradztwo firm"

          - label: "Pasek — kontakt"
            name: "pasek_4"
            widget: "string"
            default: "783 979 826 · 32 767 41 43"

          - label: "── CENNIK ──"
            name: "cennik_header"
            widget: "hidden"
            default: ""

          - label: "Usługa 1 — nazwa"
            name: "cennik_nazwa_1"
            widget: "string"
            default: "Ryczałt ewidencjonowany"

          - label: "Usługa 1 — cena"
            name: "cennik_cena_1"
            widget: "string"
            default: "150 zł"

          - label: "Usługa 2 — nazwa"
            name: "cennik_nazwa_2"
            widget: "string"
            default: "Księga przychodów i rozchodów"

          - label: "Usługa 2 — cena"
            name: "cennik_cena_2"
            widget: "string"
            default: "200 zł"

          - label: "Usługa 3 — nazwa"
            name: "cennik_nazwa_3"
            widget: "string"
            default: "Księgi handlowe"

          - label: "Usługa 3 — cena"
            name: "cennik_cena_3"
            widget: "string"
            default: "500 zł"

          - label: "Usługa 4 — nazwa"
            name: "cennik_nazwa_4"
            widget: "string"
            default: "Obsługa płacowa jednego pracownika"

          - label: "Usługa 4 — cena"
            name: "cennik_cena_4"
            widget: "string"
            default: "50 zł"

          - label: "── O FIRMIE ──"
            name: "ofirmie_header"
            widget: "hidden"
            default: ""

          - label: "Duża liczba (np. 15+)"
            name: "o_firmie_liczba"
            widget: "string"
            default: "15+"

          - label: "Opis przy liczbie"
            name: "o_firmie_opis_liczby"
            widget: "string"
            default: "lat rzetelnej obsługi księgowej na Górnym Śląsku"

          - label: "Akapit opisowy"
            name: "o_firmie_tekst"
            widget: "text"
            default: "Biuro Rachunkowe A.M. Pakuła to lata rzetelnej obsługi przedsiębiorców z Piekar Śląskich i okolic. Każdy klient jest dla nas ważny — niezależnie od wielkości firmy."

          - label: "Zaleta 1"
            name: "zaleta_1"
            widget: "string"
            default: "Obsługujemy zarówno JDG, jak i spółki z o.o. — w jednym miejscu"

          - label: "Zaleta 2"
            name: "zaleta_2"
            widget: "string"
            default: "Dobra cena i jasne zasady — transparentny cennik, bez niespodzianek"

          - label: "Zaleta 3"
            name: "zaleta_3"
            widget: "string"
            default: "Stały opiekun klienta — zawsze wiesz, do kogo dzwonisz"

          - label: "Zaleta 4"
            name: "zaleta_4"
            widget: "string"
            default: "Lokalne biuro — ul. Wyszyńskiego 6, łatwy dojazd i parking"

          - label: "Zaleta 5"
            name: "zaleta_5"
            widget: "string"
            default: "Reprezentacja przed Urzędem Skarbowym i ZUS"
